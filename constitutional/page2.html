<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article Detail - Constitutional Section</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, #FDB750 0%, #F5A623 100%);
            padding: 20px 40px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            border-radius: 0 0 15px 15px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .header h1 {
            font-size: 28px;
            color: #2c3e50;
        }

        .nav-link {
            background-color: #FF9D4C;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .nav-link:hover {
            background-color: #FF8C42;
        }

        .container {
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .article-meta {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .article-number {
            font-size: 18px;
            color: #FDB750;
            font-weight: 600;
        }

        .article-title {
            font-size: 28px;
            color: #2c3e50;
            margin: 10px 0;
            font-weight: bold;
        }

        .article-part {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }

        .section {
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 18px;
            color: #2c3e50;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #FDB750;
        }

        .section-content {
            color: #555;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .keyword-tag {
            background-color: #FFF8DC;
            color: #FDB750;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid #FDB750;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .error {
            background-color: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .footer {
            background-color: #2c3e50;
            color: #ecf0f1;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .header {
                padding: 15px;
            }

            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .container {
                padding: 20px;
            }

            .article-title {
                font-size: 22px;
            }

            .section {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <h1>📖 Article Detail</h1>
            <a href="page1.html" class="nav-link">← Back to Articles</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Article Meta -->
        <div class="article-meta" id="articleMeta">
            <div class="loading">Loading article details...</div>
        </div>

        <!-- Official Text Section -->
        <div class="section">
            <div class="section-title">📜 Official Text</div>
            <div class="section-content" id="officialText">Loading...</div>
        </div>

        <!-- Simple Explanation Section -->
        <div class="section" id="explanationSection" style="display: none;">
            <div class="section-title">💡 Simple Explanation</div>
            <div class="section-content" id="simpleExplanation"></div>
        </div>

        <!-- Real Life Example Section -->
        <div class="section" id="exampleSection" style="display: none;">
            <div class="section-title">🎯 Real-Life Example</div>
            <div class="section-content" id="realLifeExample"></div>
        </div>

        <!-- Keywords Section -->
        <div class="section" id="keywordsSection" style="display: none;">
            <div class="section-title">🔑 Key Terms</div>
            <div class="keywords" id="keywordsList"></div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>&copy; 2025 LegalEase India. All rights reserved. | Making legal knowledge accessible to all.</p>
    </div>

    <script>
        let allArticles = [];

        // Load articles on page load
        window.addEventListener('DOMContentLoaded', function() {
            loadArticles();
        });

        function loadArticles() {
            fetch('constitution_enhanced.json')
                .then(response => response.json())
                .then(data => {
                    allArticles = data;
                    displayArticle();
                })
                .catch(() => {
                    loadSampleData();
                });
        }

        function loadSampleData() {
            allArticles = [
                {
                    "article": 0,
                    "title": "Preamble",
                    "description": "WE, THE PEOPLE OF INDIA, having solemnly resolved to constitute India into a SOVEREIGN SOCIALIST SECULAR DEMOCRATIC REPUBLIC and to secure to all its citizens: JUSTICE, social, economic and political; LIBERTY of thought, expression, belief, faith and worship;\nEQUALITY of status and of opportunity; and to promote among them all FRATERNITY assuring the dignity of the individual and the unity and integrity of the Nation; IN OUR CONSTITUENT ASSEMBLY this twenty-sixth day of November, 1949, do HEREBY ADOPT, ENACT AND GIVE TO OURSELVES THIS CONSTITUTION",
                    "part": "Preamble",
                    "simpleExplanation": "This is the opening statement of India's Constitution. It declares that India is a sovereign, socialist, secular, democratic republic that aims to provide justice, liberty, equality, and brotherhood to all its citizens.",
                    "realLifeExample": "The Preamble sets the vision and values that guide all the articles in the Constitution. It's like the mission statement of the Indian government.",
                    "keywords": ["preamble", "sovereign", "democratic", "republic", "justice"]
                },
                {
                    "article": 21,
                    "title": "Protection of life and personal liberty",
                    "description": "No person shall be deprived of his life or personal liberty except according to procedure established by law.",
                    "part": "Part III: Fundamental Rights",
                    "simpleExplanation": "No person can be deprived of their life or personal liberty except according to the procedure established by law. This protects the right to live with dignity and freedom.",
                    "realLifeExample": "Police cannot arrest someone without proper legal procedure. A person cannot be harassed, tortured, or executed without following due process of law.",
                    "keywords": ["life", "liberty", "personal freedom", "due process"]
                }
            ];
            displayArticle();
        }

        function displayArticle() {
            // Get article ID from localStorage
            const articleId = localStorage.getItem('selectedArticleId');

            if (!articleId) {
                showError('No article selected. Please go back and select an article.');
                return;
            }

            // Find the article in the data
            const article = allArticles.find(a => a.article == articleId);

            if (!article) {
                showError(`Article ${articleId} not found.`);
                return;
            }

            // Display article metadata
            const metaDiv = document.getElementById('articleMeta');
            metaDiv.innerHTML = `
                <div class="article-number">Article ${article.article}</div>
                <div class="article-title">${article.title}</div>
                <div class="article-part">Part: ${article.part}</div>
            `;

            // Display official text
            document.getElementById('officialText').textContent = article.description;

            // Display simple explanation if available
            if (article.simpleExplanation) {
                document.getElementById('simpleExplanation').textContent = article.simpleExplanation;
                document.getElementById('explanationSection').style.display = 'block';
            }

            // Display real-life example if available
            if (article.realLifeExample) {
                document.getElementById('realLifeExample').textContent = article.realLifeExample;
                document.getElementById('exampleSection').style.display = 'block';
            }

            // Display keywords if available
            if (article.keywords && article.keywords.length > 0) {
                const keywordsList = document.getElementById('keywordsList');
                keywordsList.innerHTML = article.keywords.map(keyword => 
                    `<span class="keyword-tag">${keyword}</span>`
                ).join('');
                document.getElementById('keywordsSection').style.display = 'block';
            }
        }

        function showError(message) {
            const container = document.querySelector('.container');
            container.innerHTML = `<div class="error">${message}</div>`;
        }
    </script>
</body>
</html>
